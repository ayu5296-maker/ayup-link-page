<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ayu_p Links</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="page">
    <section class="profile" aria-label="Ayu_p profile">
      <!-- アイコン画像: icon.png を index.html と同じフォルダーに置くと表示されます。 -->
      <img class="artist-icon" src="icon.png" alt="Ayu_p icon">
      <p class="label">Music Artist / AI Cover</p>
      <h1>Ayu_p</h1>
      <p class="description">AIカバー・オリジナル曲をYouTubeで投稿しています。</p>
    </section>

    <section class="links" aria-label="Links">
      <!--
        URLの差し替え方法:
        各ボタンの href="#" の # の部分に、使いたいURLを貼ってください。
        例: href="https://www.youtube.com/@your-channel"
      -->

      <!-- YouTubeチャンネル用URL: 下の href に、YouTubeチャンネルのURLを設定済みです。 -->
      <a class="link-button primary" href="https://www.youtube.com/@Ayu_P/videos" target="_blank" rel="noopener noreferrer">
        <span>YouTubeチャンネル</span>
        <span class="arrow" aria-hidden="true">→</span>
      </a>

      <!-- Threads用URL: 下の href="#" の # に、ThreadsプロフィールのURLを貼る -->
      <a class="link-button" href="#" target="_blank" rel="noopener noreferrer">
        <span>Threads</span>
        <span class="arrow" aria-hidden="true">→</span>
      </a>

      <!-- 最新曲用URL: 下の href="#" の # に、最新曲のYouTube動画や配信ページのURLを貼る -->
      <a class="link-button" href="#" target="_blank" rel="noopener noreferrer">
        <span>最新曲</span>
        <span class="arrow" aria-hidden="true">→</span>
      </a>

      <div class="music-links" aria-label="Music streaming links">
        <!-- Spotify用URL: 下の href="#" の # に、Spotifyのアーティストページや曲ページのURLを貼る -->
        <a class="stream-button" href="#" target="_blank" rel="noopener noreferrer">Spotify</a>

        <!-- Apple Music用URL: 下の href="#" の # に、Apple Musicのアーティストページや曲ページのURLを貼る -->
        <a class="stream-button" href="#" target="_blank" rel="noopener noreferrer">Apple Music</a>

        <!-- Amazon Music用URL: 下の href="#" の # に、Amazon Musicのアーティストページや曲ページのURLを貼る -->
        <a class="stream-button" href="#" target="_blank" rel="noopener noreferrer">Amazon Music</a>
      </div>
    </section>
  </main>
</body>
</html>
